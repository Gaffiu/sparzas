<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#050505" />
  <title>SPARZAS PLAY</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* Splash screen nativa */
    #splash {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #0a0f0a 0%, #030503 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Inter', sans-serif;
    }
    #splash svg {
      filter: drop-shadow(0 0 20px rgba(0, 230, 118, 0.6));
      animation: logoFloat 3s ease-in-out infinite;
    }
    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    #splash p {
      color: rgba(255,255,255,0.8);
      font-weight: 500;
      margin-top: 24px;
      letter-spacing: 0.5px;
    }
    #splash .error-msg {
      display: none;
      color: #ff6b6b;
      margin-top: 16px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div id="splash">
    <svg width="80" height="80" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
          <stop stop-color="#00e676"/><stop offset="1" stop-color="#00c853"/>
        </linearGradient>
      </defs>
      <path d="M22 2L6 14V34L22 42L38 34V14L22 2Z" fill="#0f0f0f" stroke="url(#logoGrad)" stroke-width="2.5"/>
      <path d="M22 10L12 18V30L22 36L32 30V18L22 10Z" fill="url(#logoGrad)" opacity="0.9"/>
      <text x="22" y="27" textAnchor="middle" fill="#050505" fontSize="11" fontWeight="900">S</text>
    </svg>
    <p>SPARZAS PLAY</p>
    <p class="error-msg" id="splash-error">Falha ao carregar. Verifique sua conexão.</p>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Timeout de segurança para remover splash
    setTimeout(function() {
      var splash = document.getElementById('splash');
      if (splash && splash.style.display !== 'none') {
        var errorEl = document.getElementById('splash-error');
        if (errorEl) errorEl.style.display = 'block';
        splash.style.opacity = '0';
        setTimeout(function() { splash.style.display = 'none'; }, 500);
      }
    }, 7000);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').catch(function() {});
      });
    }
  </script>
</body>
</html>
