<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>SPARZAS PLAY</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    #splash {
      position: fixed; inset: 0; background: #050505; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.4s ease;
      font-family: 'Inter', sans-serif;
    }
    #splash svg { animation: neonPulse 2s infinite; }
    @keyframes neonPulse {
      0%,100% { filter: drop-shadow(0 0 6px #00e676); }
      50% { filter: drop-shadow(0 0 18px #00e676) drop-shadow(0 0 36px #1de9b6); }
    }
    #splash .error-msg {
      display: none;
      color: #ff6b6b;
      margin-top: 20px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div id="splash">
    <svg width="80" height="80" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs><filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
      <path d="M20 2L6 12V30L20 38L34 30V12L20 2Z" fill="#0f0f0f" stroke="#00e676" strokeWidth="2" filter="url(#glow)"/>
      <path d="M20 10L12 17V27L20 32L28 27V17L20 10Z" fill="#00e676" opacity="0.8"/>
      <text x="20" y="25" textAnchor="middle" fill="#0f0f0f" fontSize="10" fontWeight="900">S</text>
    </svg>
    <p style="color:#00e676; font-weight:600; margin-top:20;">SPARZAS PLAY</p>
    <p class="error-msg" id="splash-error">Falha ao carregar o app. Verifique sua conexão.</p>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Timeout de segurança: esconde o splash após 8 segundos, mostrando erro se necessário
    setTimeout(function() {
      var splash = document.getElementById('splash');
      if (splash && splash.style.display !== 'none') {
        var errorEl = document.getElementById('splash-error');
        if (errorEl) errorEl.style.display = 'block';
        splash.style.opacity = '0';
        setTimeout(function() { splash.style.display = 'none'; }, 400);
      }
    }, 8000);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').catch(function() {});
      });
    }
  </script>
</body>
</html>
